<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      font-family: Arial, sans-serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }

    .loader img {
      width: 180px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #ff2e63;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- Loader avec ton image -->
  <div class="loader" id="loader">
    <img src="https://raw.githubusercontent.com/goongrls/B/main/preview.jpg" alt="preview">
    <p>Loading your content... 👀</p>
    <a href="https://getmysocial.com/nanhannah" class="btn">Click here if nothing loads</a>
  </div>

  <!-- Iframe -->
  <iframe id="frame" src="https://getmysocial.com/nanhannah"></iframe>

  <script>
    setTimeout(function() {
      document.getElementById("loader").style.display = "none";
      document.getElementById("frame").style.display = "block";
    }, 2000);
  </script>

</body>
</html>
